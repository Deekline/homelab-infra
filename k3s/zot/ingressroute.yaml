apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zot
  namespace: zot
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`registry.d-kline.org`)
      kind: Rule
      middlewares:
        - name: local-only
          namespace: traefik
      services:
        - name: zot
          port: 5000
  tls:
    secretName: d-kline-org-tls
