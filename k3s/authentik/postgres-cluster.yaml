apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-db
  namespace: authentik
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16

  bootstrap:
    initdb:
      database: authentik
      owner: deekline
      secret:
        name: authentik-db-credentials

  storage:
    size: 5Gi
    storageClass: nfs-db
