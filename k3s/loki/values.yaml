loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: nfs-monitoring
    size: 20Gi

# Disable microservices components
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable gateway — internal cluster use only
gateway:
  enabled: false

# Reduce resource overhead
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
