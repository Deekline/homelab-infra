kubeProxyReplacement: true
k8sServiceHost: "10.0.10.9"
k8sServicePort: 6443

socketLB:
  enabled: true

ipam:
  mode: kubernetes

routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: "10.42.0.0/16"

hubble:
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enableOpenMetrics: true
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - http
    serviceMonitor:
      enabled: true
      labels:
        release: monitoring

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: monitoring

operator:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      labels:
        release: monitoring
