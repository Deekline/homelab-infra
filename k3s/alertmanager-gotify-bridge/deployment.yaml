---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: alertmanager-gotify-bridge
    namespace: monitoring
spec:
    replicas: 1
    selector:
        matchLabels:
            app: alertmanager-gotify-bridge
    template:
        metadata:
            labels:
                app: alertmanager-gotify-bridge
        spec:
            securityContext:
                runAsNonRoot: true
                runAsUser: 65534
            containers:
                - name: bridge
                  image: ghcr.io/druggeri/alertmanager_gotify_bridge:latest
                  ports:
                      - containerPort: 8080
                  env:
                      - name: GOTIFY_ENDPOINT
                        value: http://gotify.gotify.svc.cluster.local:80/message
                      - name: GOTIFY_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: alertmanager-gotify-bridge
                                key: gotifyToken
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                  resources:
                      requests:
                          cpu: 10m
                          memory: 16Mi
                      limits:
                          memory: 64Mi

---
apiVersion: v1
kind: Service
metadata:
    name: alertmanager-gotify-bridge
    namespace: monitoring
spec:
    selector:
        app: alertmanager-gotify-bridge
    ports:
        - port: 8080
          targetPort: 8080
