apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-runner-config
  namespace: gitea-runner
data:
  config.yaml: |
    log:
      level: info
    runner:
      capacity: 3
      # Maps workflow 'runs-on' labels to Docker images
      labels:
        - "ubuntu-latest:docker://ubuntu:22.04"
        - "ubuntu-22.04:docker://ubuntu:22.04"
      timeout: 1h
      fetch_timeout: 5s
      fetch_interval: 2s
    cache:
      enabled: true
      dir: /cache
