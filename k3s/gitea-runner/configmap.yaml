apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-runner-config
  namespace: gitea-runner
data:
  config.yaml: |
    log:
      level: info
    runner:
      file: /data/.runner
      capacity: 3
      timeout: 1h
      fetch_timeout: 5s
      fetch_interval: 2s
    cache:
      enabled: true
      dir: /cache
    container:
      options: -e DOCKER_HOST=unix:///var/run/docker.sock
