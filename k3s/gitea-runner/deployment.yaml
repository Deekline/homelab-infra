---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-runner-data
  namespace: gitea-runner
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner
  namespace: gitea-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-runner
  template:
    metadata:
      labels:
        app: gitea-runner
    spec:
      restartPolicy: Always
      containers:
        - name: runner
          image: gitea/act_runner:latest
          command:
            - sh
            - -c
            - |
              while ! nc -z localhost 2375; do sleep 1; done
              # Register only if not already registered (persisted in PVC)
              if [ ! -f /data/.runner ]; then
                act_runner register --no-interactive \
                  --config /config/config.yaml \
                  --instance "$GITEA_INSTANCE_URL" \
                  --token "$GITEA_RUNNER_REGISTRATION_TOKEN" \
                  --name "$GITEA_RUNNER_NAME" \
                  --labels "ubuntu-latest:docker://ubuntu:22.04,ubuntu-22.04:docker://ubuntu:22.04"
              fi
              act_runner daemon --config /config/config.yaml
          env:
            - name: GITEA_INSTANCE_URL
              value: "http://10.0.10.150:30008"
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-runner-token
                  key: token
            - name: GITEA_RUNNER_NAME
              value: "k3s-runner"
            - name: DOCKER_HOST
              value: tcp://localhost:2375
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            - name: cache
              mountPath: /cache

        - name: dind
          image: docker:27-dind
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker

      volumes:
        - name: config
          configMap:
            name: gitea-runner-config
        - name: data
          persistentVolumeClaim:
            claimName: gitea-runner-data
        - name: docker-storage
          emptyDir: {}
        - name: cache
          emptyDir: {}
