container_runtime: containerd

lapi:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  persistentVolume:
    config:
      enabled: true
      storageClassName: longhorn
      size: 100Mi
    data:
      enabled: true
      storageClassName: longhorn
      size: 1Gi
  env:
    - name: ENROLL_KEY
      valueFrom:
        secretKeyRef:
          name: crowdsec-secrets
          key: enrollKey
          optional: true
  extraVolumes:
    - name: gotify-notifier
      secret:
        secretName: crowdsec-secrets
        items:
          - key: gotify-http.yaml
            path: gotify-http.yaml
  extraVolumeMounts:
    - name: gotify-notifier
      mountPath: /etc/crowdsec/notifications/gotify-http.yaml
      subPath: gotify-http.yaml

config:
  profiles.yaml: |
    name: default_ip_remediation
    filters:
      - Alert.Remediation == true && Alert.GetScope() == "Ip"
    decisions:
      - type: ban
        duration: 4h
    notifications:
      - http_gotify
    on_success: break

agent:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  env:
    - name: COLLECTIONS
      value: "crowdsecurity/traefik crowdsecurity/linux"
  acquisition:
    - namespace: traefik
      podName: traefik-*
      program: traefik
