---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: gotify-data-nfs
    namespace: gotify
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: nfs-storage
    resources:
        requests:
            storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: igotify-data-nfs
    namespace: gotify
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: nfs-storage
    resources:
        requests:
            storage: 256Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: gotify
    namespace: gotify
    labels:
        app.kubernetes.io/name: gotify
spec:
    replicas: 1
    selector:
        matchLabels:
            app.kubernetes.io/name: gotify
    template:
        metadata:
            labels:
                app.kubernetes.io/name: gotify
        spec:
            securityContext:
                fsGroup: 1000
            containers:
                - name: gotify
                  image: gotify/server:latest
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 80
                        protocol: TCP
                  env:
                      - name: TZ
                        value: Europe/Warsaw
                  volumeMounts:
                      - name: data
                        mountPath: /app/data
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop: [ALL]
                      runAsNonRoot: true
                      runAsUser: 1000
                      runAsGroup: 1000
                      seccompProfile:
                          type: RuntimeDefault
                  resources:
                      requests:
                          cpu: 50m
                          memory: 64Mi
                      limits:
                          memory: 128Mi
            volumes:
                - name: data
                  persistentVolumeClaim:
                      claimName: gotify-data-nfs

---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: igotify
    namespace: gotify
    labels:
        app.kubernetes.io/name: igotify
spec:
    replicas: 1
    selector:
        matchLabels:
            app.kubernetes.io/name: igotify
    template:
        metadata:
            labels:
                app.kubernetes.io/name: igotify
        spec:
            containers:
                - name: igotify
                  image: ghcr.io/androidseb25/igotify-notification-assist:latest
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 8080
                        protocol: TCP
                  env:
                      - name: GOTIFY_SERVERS
                        value: "http://gotify.gotify.svc.cluster.local"
                      - name: ASPNETCORE_HTTPSREDIRECTION_ENABLED
                        value: "false"
                      - name: ASPNETCORE_ENVIRONMENT
                        value: Production
                  envFrom:
                      - secretRef:
                            name: igotify-secrets
                  volumeMounts:
                      - name: data
                        mountPath: /app/data
                  resources:
                      requests:
                          cpu: 50m
                          memory: 128Mi
                      limits:
                          memory: 256Mi
            volumes:
                - name: data
                  persistentVolumeClaim:
                      claimName: igotify-data-nfs

---
apiVersion: v1
kind: Service
metadata:
    name: gotify
    namespace: gotify
    labels:
        app.kubernetes.io/name: gotify
spec:
    selector:
        app.kubernetes.io/name: gotify
    ports:
        - name: http
          port: 80
          targetPort: http

---
apiVersion: v1
kind: Service
metadata:
    name: igotify
    namespace: gotify
    labels:
        app.kubernetes.io/name: igotify
spec:
    selector:
        app.kubernetes.io/name: igotify
    ports:
        - name: http
          port: 8080
          targetPort: http
