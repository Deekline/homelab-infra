---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.d-kline.org`)
      kind: Rule
      middlewares:
        - name: local-only
        - name: authelia
          namespace: traefik
        - name: security-headers
      services:
        - name: api@internal
          kind: TraefikService
  tls: {}
