---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: ignorecert
  namespace: traefik
spec:
  serverName: "proxmox"
  insecureSkipVerify: true

---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: nasignore
  namespace: traefik
spec:
  serverName: "truenas"
  insecureSkipVerify: true

# ── Proxmox ────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Service
metadata:
  name: proxmox-external
  namespace: traefik
spec:
  clusterIP: None
  ports:
    - port: 8006
      protocol: TCP

---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: proxmox-external
  namespace: traefik
  labels:
    kubernetes.io/service-name: proxmox-external
addressType: IPv4
endpoints:
  - addresses:
      - "10.0.10.2"
ports:
  - port: 8006
    protocol: TCP

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: proxmox
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`proxmox.d-kline.org`)
      kind: Rule
      middlewares:
        - name: local-only
      services:
        - name: proxmox-external
          port: 8006
          serversTransport: ignorecert
  tls: {}

