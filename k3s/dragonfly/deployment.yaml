apiVersion: apps/v1
kind: Deployment
metadata:
  name: dragonfly
  namespace: dragonfly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dragonfly
  template:
    metadata:
      labels:
        app: dragonfly
    spec:
      containers:
        - name: dragonfly
          image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.25.0
          ports:
            - containerPort: 6379
          args:
            - --requirepass=$(DRAGONFLY_PASSWORD)
            - --default_lua_flags=allow-undeclared-keys
          env:
            - name: DRAGONFLY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dragonfly-secret
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dragonfly
  namespace: dragonfly
spec:
  selector:
    app: dragonfly
  ports:
    - port: 6379
      targetPort: 6379
