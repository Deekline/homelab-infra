apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db
  namespace: immich
spec:
  instances: 1
  # Bridge image for pgvecto.rs -> VectorChord migration: bundles both
  # extensions so Immich (still v2.7.5) can reindex onto vchord before we
  # drop pgvecto.rs. Swap to tensorchord/cloudnative-vectorchord once done.
  imageName: ghcr.io/corentingiraud/cnpg-pgvector-vectorchord:16-migration

  postgresql:
    shared_preload_libraries:
      - vectors.so
      - vchord.so

  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-db-credentials
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vectors CASCADE;
        - CREATE EXTENSION IF NOT EXISTS cube CASCADE;
        - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;
        - GRANT USAGE ON SCHEMA vectors TO immich;
        - GRANT SELECT ON ALL TABLES IN SCHEMA vectors TO immich;
        - ALTER ROLE immich IN DATABASE immich SET search_path TO "$user", public, vectors;

  storage:
    size: 10Gi
    storageClass: nfs-db
