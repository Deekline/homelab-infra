apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db
  namespace: immich
spec:
  instances: 1
  # VectorChord-only image — pgvecto.rs migration finished; Immich reindexed
  # clip_index/face_index onto vchord while both extensions were installed.
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16-0.3.0

  postgresql:
    shared_preload_libraries:
      - vchord.so

  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-db-credentials
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vectors CASCADE;
        - CREATE EXTENSION IF NOT EXISTS cube CASCADE;
        - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;
        - GRANT USAGE ON SCHEMA vectors TO immich;
        - GRANT SELECT ON ALL TABLES IN SCHEMA vectors TO immich;
        - ALTER ROLE immich IN DATABASE immich SET search_path TO "$user", public, vectors;

  storage:
    size: 10Gi
    storageClass: nfs-db
