apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: homelab-alerts
  namespace: monitoring
spec:
  groups:
    - name: homelab.pod
      rules:
        - alert: PodOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "OOMKilled: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled."

        - alert: PodFailed
          expr: |
            kube_pod_status_phase{phase="Failed"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod failed: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in Failed state for more than 5 minutes."

    - name: homelab.node
      rules:
        - alert: NodeHighMemoryUsage
          expr: |
            (
              node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes
            ) / node_memory_MemTotal_bytes * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} memory usage is {{ printf \"%.1f\" $value }}% (threshold: 85%)."

        - alert: NodeHighCPUUsage
          expr: |
            100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} CPU usage is {{ printf \"%.1f\" $value }}% (threshold: 85%)."

    - name: homelab.container
      rules:
        - alert: ContainerHighMemoryUsage
          expr: |
            (
              container_memory_working_set_bytes{container!="", image!=""}
              / on(namespace, pod, container)
              kube_pod_container_resource_limits{resource="memory", container!=""}
            ) * 100 > 90
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory in {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }}"
            description: "Container {{ $labels.container }} ({{ $labels.namespace }}/{{ $labels.pod }}) is using {{ printf \"%.1f\" $value }}% of its memory limit."

        - alert: ContainerHighCPUUsage
          expr: |
            (
              rate(container_cpu_usage_seconds_total{container!="", image!=""}[5m])
              / on(namespace, pod, container)
              kube_pod_container_resource_limits{resource="cpu", container!=""}
            ) * 100 > 90
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU in {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }}"
            description: "Container {{ $labels.container }} ({{ $labels.namespace }}/{{ $labels.pod }}) is using {{ printf \"%.1f\" $value }}% of its CPU limit."
