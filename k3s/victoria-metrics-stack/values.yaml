# Required when using helm releaseName in ArgoCD so VMServiceScrapes resolve correctly
argocdReleaseOverride: monitoring

grafana:
  enabled: true

  initChownData:
    enabled: false

  resources:
    requests:
      memory: 128Mi
    limits:
      memory: 800Mi

  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  grafana.ini:
    security:
      allow_embedding: true
    auth.anonymous:
      enabled: true
      org_name: Main Org.
      org_role: Viewer
    explore:
      enabled: false

  persistence:
    enabled: true
    storageClassName: nfs-monitoring
    size: 5Gi

  ingress:
    enabled: false

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - vmsingle
            topologyKey: kubernetes.io/hostname

  sidecar:
    datasources:
      defaultDatasourceEnabled: true
      defaultDatasourceScrapeInterval: 60s
    dashboards:
      defaultFolderName: "Internal"

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

vmsingle:
  enabled: true
  spec:
    retentionPeriod: "30d"
    resources:
      requests:
        memory: 512Mi
      limits:
        memory: 1Gi
    storage:
      storageClassName: nfs-monitoring
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - loki
              topologyKey: kubernetes.io/hostname

vmagent:
  enabled: true
  spec:
    scrapeInterval: 60s
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 256Mi

vmalert:
  enabled: true
  spec:
    evaluationInterval: 60s
    resources:
      requests:
        memory: 32Mi
      limits:
        memory: 128Mi

alertmanager:
  enabled: true
  spec:
    secrets:
      - alertmanager-telegram
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: telegram
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
        - receiver: "null"
          matchers:
            - alertname = "InfoInhibitor"
        - receiver: "null"
          matchers:
            - alertname = "AlertmanagerFailedToSendAlerts"
        - receiver: "null"
          matchers:
            - alertname = "AlertmanagerClusterFailedToSendAlerts"
        - receiver: "null"
          matchers:
            - alertname = "RecordingRulesNoData"
            - recording = "count:up0"
    receivers:
      - name: "null"
      - name: telegram
        telegram_configs:
          - bot_token_file: /etc/vm/secrets/alertmanager-telegram/bot_token
            chat_id_file: /etc/vm/secrets/alertmanager-telegram/chat_id
            send_resolved: true
            parse_mode: ""
            message: |-
              {{ if eq .Status "firing" }}🔥 FIRING{{ else }}✅ RESOLVED{{ end }}: {{ .CommonLabels.alertname }}
              {{- if .CommonLabels.severity }}
              Severity: {{ .CommonLabels.severity }}{{ end }}
              {{- if .CommonLabels.namespace }}
              Namespace: {{ .CommonLabels.namespace }}{{ end }}
              {{- range .Alerts }}
              {{ .Annotations.summary }}
              {{- end }}
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ["alertname", "namespace", "pod"]

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false

defaultRules:
  groups:
    kube-scheduler.rules:
      enabled: false
    kubernetes-system-scheduler:
      enabled: false
    kubernetes-system-controller-manager:
      enabled: false

defaultDashboards:
  dashboards:
    grafana-overview:
      enabled: false
    victoriametrics-vmalert:
      enabled: false
    victoriametrics-operator:
      enabled: false
  sources:
    kube-prometheus:
      enabled: false
    victoriametrics-vmalert:
      enabled: false
    victoriametrics-operator:
      enabled: false
    kubernetes-system-api-server:
      enabled: false
    kubernetes-system-coredns:
      enabled: false

prometheus-node-exporter:
  enabled: true

kube-state-metrics:
  enabled: true
