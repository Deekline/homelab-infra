---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: speedtest-tracker-data-nfs
    namespace: speedtest-tracker
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: nfs-storage
    resources:
        requests:
            storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: speedtest-tracker
    namespace: speedtest-tracker
    labels:
        app.kubernetes.io/name: speedtest-tracker
    annotations:
        reloader.stakater.com/auto: "true"
spec:
    replicas: 1
    selector:
        matchLabels:
            app.kubernetes.io/name: speedtest-tracker
    template:
        metadata:
            labels:
                app.kubernetes.io/name: speedtest-tracker
        spec:
            securityContext:
                fsGroup: 1000
            containers:
                - name: speedtest-tracker
                  image: ghcr.io/alexjustesen/speedtest-tracker:latest
                  imagePullPolicy: Always
                  ports:
                      - name: http
                        containerPort: 80
                        protocol: TCP
                  env:
                      - name: PUID
                        value: "1000"
                      - name: PGID
                        value: "1000"
                      - name: TZ
                        value: Europe/Warsaw
                      - name: DISPLAY_TIMEZONE
                        value: Europe/Warsaw
                      - name: APP_URL
                        value: https://speedtest.d-kline.org
                      - name: APP_KEY
                        valueFrom:
                            secretKeyRef:
                                name: speedtest-tracker-secrets
                                key: APP_KEY
                  volumeMounts:
                      - name: data
                        mountPath: /config
                  resources:
                      requests:
                          cpu: 100m
                          memory: 256Mi
                      limits:
                          memory: 512Mi
            volumes:
                - name: data
                  persistentVolumeClaim:
                      claimName: speedtest-tracker-data-nfs

---
apiVersion: v1
kind: Service
metadata:
    name: speedtest-tracker
    namespace: speedtest-tracker
    labels:
        app.kubernetes.io/name: speedtest-tracker
spec:
    selector:
        app.kubernetes.io/name: speedtest-tracker
    ports:
        - name: http
          port: 80
          targetPort: http
