---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`longhorn.d-kline.org`)
      middlewares:
        - name: local-only
          namespace: traefik
        - name: authentik
          namespace: traefik
        - name: security-headers
          namespace: traefik
      services:
        - name: longhorn-frontend
          port: 80
  tls:
    secretName: d-kline-org-tls
