apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  homelab-overview.json: |
    {
      "uid": "homelab-overview",
      "title": "Homelab Overview",
      "tags": ["homelab"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 8,
          "title": "Node CPU / Memory",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "1 - avg by (nodename) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]) * on(instance) group_left(nodename) node_uname_info)",
              "legendFormat": "CPU {{nodename}}"
            },
            {
              "datasource": { "type": "prometheus" },
              "expr": "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * on(instance) group_left(nodename) node_uname_info",
              "legendFormat": "RAM {{nodename}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Pod Status by Namespace",
          "type": "table",
          "gridPos": { "x": 0, "y": 8, "w": 8, "h": 12 },
          "options": {
            "sortBy": [{ "displayName": "Namespace" }],
            "footer": { "show": false }
          },
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "align": "center" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Namespace" },
                "properties": [{ "id": "custom.align", "value": "left" }, { "id": "custom.width", "value": 140 }]
              },
              {
                "matcher": { "id": "byName", "options": "Running" },
                "properties": [
                  { "id": "custom.width", "value": 75 },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Pending" },
                "properties": [
                  { "id": "custom.width", "value": 75 },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }] } },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Failed" },
                "properties": [
                  { "id": "custom.width", "value": 75 },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "merge", "options": {} },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "namespace": "Namespace",
                  "Value #A": "Running",
                  "Value #B": "Pending",
                  "Value #C": "Failed"
                },
                "excludeByName": { "Time": true }
              }
            }
          ],
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum by (namespace) (kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "{{namespace}}",
              "refId": "A",
              "instant": true
            },
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum by (namespace) (kube_pod_status_phase{phase=\"Pending\"})",
              "legendFormat": "{{namespace}}",
              "refId": "B",
              "instant": true
            },
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum by (namespace) (kube_pod_status_phase{phase=\"Failed\"})",
              "legendFormat": "{{namespace}}",
              "refId": "C",
              "instant": true
            }
          ]
        },
        {
          "id": 6,
          "title": "CPU by Namespace",
          "type": "bargauge",
          "gridPos": { "x": 8, "y": 8, "w": 8, "h": 12 },
          "options": {
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 0.8 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\"}[5m])) / scalar(sum(kube_node_status_allocatable{resource=\"cpu\"}))",
              "legendFormat": "{{namespace}}",
              "instant": true
            }
          ]
        },
        {
          "id": 7,
          "title": "Memory by Namespace",
          "type": "bargauge",
          "gridPos": { "x": 16, "y": 8, "w": 8, "h": 12 },
          "options": {
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1073741824 },
                  { "color": "red", "value": 3221225472 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\", container!=\"POD\"})",
              "legendFormat": "{{namespace}}",
              "instant": true
            }
          ]
        },
        {
          "id": 1,
          "title": "Cluster CPU Utilization",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 20, "w": 8, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))",
              "legendFormat": "CPU"
            }
          ]
        },
        {
          "id": 2,
          "title": "Cluster Memory Utilization",
          "type": "timeseries",
          "gridPos": { "x": 8, "y": 20, "w": 8, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)",
              "legendFormat": "Memory"
            }
          ]
        },
        {
          "id": 3,
          "title": "Cluster Network IO",
          "type": "timeseries",
          "gridPos": { "x": 16, "y": 20, "w": 8, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cni.*|flannel.*|cilium.*\"}[5m]))",
              "legendFormat": "Receive"
            },
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cni.*|flannel.*|cilium.*\"}[5m]))",
              "legendFormat": "Transmit"
            }
          ]
        }
      ],
      "schemaVersion": 38
    }
