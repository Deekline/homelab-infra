grafana:
  initChownData:
    enabled: false

  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    storageClassName: nfs-monitoring
    size: 5Gi

  ingress:
    enabled: false

  extraEnvFrom:
    - secretRef:
        name: grafana-gotify-token

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

  alerting:
    notificationTemplates.yaml:
      apiVersion: 1
      templates:
        - name: gotify.payload
          template: |-
            {{ define "gotify.payload" -}}
            {"title":"Grafana [{{ .Status }}]","message":"{{ range .Alerts }}[{{ .Status }}] {{ .Labels.alertname }} {{ end }}","priority":5}
            {{- end }}
    contactpoints.yaml:
      apiVersion: 1
      contactPoints:
        - orgId: 1
          name: Gotify
          receivers:
            - uid: gotify
              type: webhook
              settings:
                url: https://gotify.d-kline.org/message?token=${GF_GOTIFY_TOKEN}
                httpMethod: POST
                message: '{{ template "gotify.payload" . }}'

prometheus:
  prometheusSpec:
    retention: 90d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-monitoring
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

  ingress:
    enabled: false

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-monitoring
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  ingress:
    enabled: false

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "null"
    receivers:
      - name: "null"

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
