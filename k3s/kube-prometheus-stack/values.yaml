grafana:
  initChownData:
    enabled: false

  resources:
    requests:
      memory: 128Mi
    limits:
      memory: 800Mi

  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  grafana.ini:
    security:
      allow_embedding: true
    auth.anonymous:
      enabled: true
      org_name: Main Org.
      org_role: Viewer
    explore:
      enabled: false

  persistence:
    enabled: true
    storageClassName: nfs-monitoring
    size: 5Gi

  ingress:
    enabled: false

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - prometheus
            topologyKey: kubernetes.io/hostname

  sidecar:
    datasources:
      defaultDatasourceEnabled: true
      defaultDatasourceScrapeInterval: 60s
    dashboards:
      defaultFolderName: "Internal"

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

prometheus:
  prometheusSpec:
    retention: 30d
    scrapeInterval: 60s
    evaluationInterval: 60s
    resources:
      requests:
        memory: 512Mi
      limits:
        memory: 1500Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-monitoring
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - loki
              topologyKey: kubernetes.io/hostname

  ingress:
    enabled: false

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-monitoring
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - prometheus
              topologyKey: kubernetes.io/hostname

  ingress:
    enabled: false

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: gotify
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
        - receiver: "null"
          matchers:
            - alertname = "InfoInhibitor"
        - receiver: "null"
          matchers:
            - alertname = "AlertmanagerFailedToSendAlerts"
        - receiver: "null"
          matchers:
            - alertname = "AlertmanagerClusterFailedToSendAlerts"
    receivers:
      - name: "null"
      - name: gotify
        webhook_configs:
          - url: http://alertmanager-gotify-bridge.monitoring.svc.cluster.local:8080/gotify_webhook
            send_resolved: true
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ["alertname", "namespace", "pod"]

defaultRules:
  rules:
    kubeProxy: false
    kubeControllerManager: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
