grafana:
  initChownData:
    enabled: false

  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  grafana.ini:
    security:
      allow_embedding: true

  persistence:
    enabled: true
    storageClassName: nfs-monitoring
    size: 5Gi

  ingress:
    enabled: false

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - prometheus
            topologyKey: kubernetes.io/hostname

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

prometheus:
  prometheusSpec:
    retention: 90d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-monitoring
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - loki
              topologyKey: kubernetes.io/hostname

  ingress:
    enabled: false

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-monitoring
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - prometheus
              topologyKey: kubernetes.io/hostname

  ingress:
    enabled: false

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: gotify
    receivers:
      - name: "null"
      - name: gotify
        webhook_configs:
          - url: http://alertmanager-gotify-bridge.monitoring.svc.cluster.local:8080/gotify_webhook
            send_resolved: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
