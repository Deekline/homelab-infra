# SOPS configuration
# Defines encryption rules for secrets in this repo
#
# Setup:
#   1. Install: pacman -S sops age
#   2. Generate keypair: age-keygen -o ~/.config/sops/age/keys.txt
#   3. Paste the public key below (age1...)
#   4. Encrypt: sops -e secrets.yaml > secrets.yaml (in-place) or sops secrets.yaml (interactive)
#
creation_rules:
  # Encrypt only the 'stringData' values in secret files
  - path_regex: .*secrets\.yaml$
    encrypted_regex: ^(data|stringData)$
    age: age1vnjflcl0aeefw82f5klz764c4r5ddg9ad63y7vmu58dxmw026sms047q3j
