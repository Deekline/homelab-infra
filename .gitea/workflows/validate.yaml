name: Validate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  sops-check:
    name: Secrets encrypted
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if any secrets.yaml is unencrypted
        run: |
          fail=0
          for f in $(find k3s -name '*secrets.yaml'); do
            if grep -q 'stringData:' "$f" && ! grep -q 'ENC\[' "$f"; then
              echo "PLAINTEXT SECRET: $f"
              fail=1
            fi
          done
          exit $fail

  kubeconform:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform

      - name: Validate k8s manifests
        run: |
          grep -rl '^kind:' k3s/ | grep '\.yaml$' | grep -v 'values' | xargs kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary

  trivy:
    name: Trivy config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan for misconfigurations
        run: |
          trivy config \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignorefile .trivyignore \
            k3s/

  notify-failure:
    name: Notify failure
    runs-on: ubuntu-latest
    needs: [sops-check, kubeconform, trivy]
    if: failure()
    steps:
      - name: Send Gotify notification
        run: |
          curl -s -X POST "${{ secrets.GOTIFY_URL }}/message" \
            -H "X-Gotify-Key: ${{ secrets.GOTIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"CI failed — homelab-infra\",
              \"message\": \"Pipeline failed on branch ${{ github.ref_name }} (${{ github.sha }})\nTrigger: ${{ github.event_name }}\",
              \"priority\": 7
            }"

  promote:
    name: Promote to deploy
    runs-on: ubuntu-latest
    needs: [sops-check, kubeconform, trivy]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITEA_TOKEN }}

      - name: Push to deploy branch
        run: |
          git push origin HEAD:deploy
