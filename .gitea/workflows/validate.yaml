name: Validate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── 1. SOPS encryption check ─────────────────────────────────────────────
  sops-check:
    name: Secrets encrypted
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if any secrets.yaml is unencrypted
        run: |
          fail=0
          for f in $(find infra -name '*secrets.yaml'); do
            if grep -q 'stringData:' "$f" && ! grep -q 'ENC\[' "$f"; then
              echo "PLAINTEXT SECRET: $f — encrypt with: sops --encrypt --in-place $f"
              fail=1
            fi
          done
          exit $fail

  # ── 2. Kubernetes manifest validation ────────────────────────────────────
  kubeconform:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform

      - name: Run kubeconform
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary \
            infra/k3s/

  # ── 3. Trivy misconfiguration scan ───────────────────────────────────────
  trivy:
    name: Trivy config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan manifests for misconfigurations
        run: |
          trivy config \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignorefile infra/.trivyignore \
            infra/k3s/
