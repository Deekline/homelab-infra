name: Validate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  sops-check:
    name: Secrets encrypted
    runs-on: ubuntu-latest
    container:
      image: registry.d-kline.org/ci-tools:latest
      credentials:
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Fail if any secrets.yaml is unencrypted
        run: |
          fail=0
          for f in $(find k3s -name '*secrets.yaml'); do
            if grep -q 'stringData:' "$f" && ! grep -q 'ENC\[' "$f"; then
              echo "PLAINTEXT SECRET: $f"
              fail=1
            fi
          done
          exit $fail

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    container:
      image: registry.d-kline.org/ci-tools:latest
      credentials:
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Lint all YAML files
        run: yamllint -d relaxed .

  kubeconform:
    name: Validate manifests
    runs-on: ubuntu-latest
    container:
      image: registry.d-kline.org/ci-tools:latest
      credentials:
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate k8s manifests
        run: |
          grep -rl '^kind:' k3s/ | grep '\.yaml$' | grep -v 'values' | xargs kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary

  trivy:
    name: Trivy config scan
    runs-on: ubuntu-latest
    container:
      image: registry.d-kline.org/ci-tools:latest
      credentials:
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Scan for misconfigurations
        run: |
          trivy config \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignorefile .trivyignore \
            k3s/
