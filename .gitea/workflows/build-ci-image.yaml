name: Build CI tools image

on:
  push:
    branches: [main]
    paths:
      - ci-tools/Dockerfile
  workflow_dispatch:

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push with buildah
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          apt-get update -qq && apt-get install -y -qq buildah

          buildah build -t registry.d-kline.org/ci-tools:latest ci-tools/

          buildah push \
            --creds "$REGISTRY_USER:$REGISTRY_PASSWORD" \
            registry.d-kline.org/ci-tools:latest
