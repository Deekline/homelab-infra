name: Build CI tools image

on:
  push:
    branches: [main]
    paths:
      - ci-tools/Dockerfile
  workflow_dispatch:

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push with kaniko
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          mkdir -p /kaniko/.docker
          printf '{"auths":{"registry.d-kline.org":{"auth":"%s"}}}' \
            "$(printf '%s:%s' "$REGISTRY_USER" "$REGISTRY_PASSWORD" | base64 -w0)" \
            > /kaniko/.docker/config.json

          curl -sSL \
            https://github.com/GoogleContainerTools/kaniko/releases/download/v1.23.2/executor \
            -o /usr/local/bin/executor
          chmod +x /usr/local/bin/executor

          executor \
            --context=dir://$(pwd)/ci-tools \
            --dockerfile=ci-tools/Dockerfile \
            --destination=registry.d-kline.org/ci-tools:latest
