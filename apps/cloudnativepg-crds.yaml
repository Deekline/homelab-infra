apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnativepg-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
    project: default
    source:
      repoURL: ssh://git@10.0.10.150:30009/deekline/homelab-infra.git
      targetRevision: HEAD
      path: k3s/cloudnativepg
      directory:
        include: crds.yaml
    destination:
      server: https://kubernetes.default.svc
      namespace: cnpg-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true
        - Replace=true
