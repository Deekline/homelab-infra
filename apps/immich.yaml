apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: immich
    namespace: argocd
    annotations:
        argocd.argoproj.io/sync-wave: "5"
spec:
    project: default
    source:
        repoURL: ssh://git@10.0.10.150:30009/deekline/homelab-infra.git
        targetRevision: deploy
        path: k3s/immich
    destination:
        server: https://kubernetes.default.svc
        namespace: immich
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
